services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-career-backend
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ai-career-frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000